<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Operacional SCC</title>
<style>
:root {
  --bg:#f5f4f0; --surface:#fff; --border:rgba(0,0,0,.10); --border-md:rgba(0,0,0,.18);
  --txt:#1a1a18; --txt-2:#5f5e5a; --txt-3:#8f8e8a;
  --blue:#185FA5; --blue-bg:#E6F1FB; --blue-txt:#0C447C;
  --teal:#0F6E56; --teal-bg:#E1F5EE; --teal-txt:#085041;
  --amber:#854F0B; --amber-bg:#FAEEDA; --amber-txt:#633806;
  --red:#A32D2D; --red-bg:#FCEBEB; --red-txt:#791F1F;
  --green:#3B6D11; --green-bg:#EAF3DE; --green-txt:#27500A;
  --gray-bg:#f1efe8; --gray-txt:#5f5e5a;
  --r-sm:6px; --r-md:10px; --r-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--surface:#242420;--border:rgba(255,255,255,.10);--border-md:rgba(255,255,255,.18);
  --txt:#f0efe9;--txt-2:#a8a79f;--txt-3:#6e6d67;
  --blue-bg:#0c3a6b;--blue-txt:#85b7eb;--teal-bg:#073d2f;--teal-txt:#5dcaa5;
  --amber-bg:#4a2800;--amber-txt:#fac775;--red-bg:#4a1515;--red-txt:#f09595;
  --green-bg:#1a3308;--green-txt:#97c459;--gray-bg:#2c2c2a;--gray-txt:#a8a79f;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:10;}
.logo{font-size:15px;font-weight:600;}.logo span{color:var(--blue);}
.sync-info{font-size:12px;color:var(--txt-3);margin-left:auto;}
.sync-btn{font-size:12px;background:none;border:1px solid var(--border-md);border-radius:var(--r-sm);padding:4px 10px;cursor:pointer;color:var(--txt-2);}
.sync-btn:hover{background:var(--gray-bg);}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 20px;overflow-x:auto;}
.tab{padding:12px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--txt-2);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tab.active{color:var(--txt);border-bottom-color:var(--blue);font-weight:500;}
.tab-count{font-size:11px;padding:1px 6px;border-radius:10px;background:var(--gray-bg);color:var(--txt-3);}
.tab.active .tab-count{background:var(--blue-bg);color:var(--blue-txt);}
.tab-count.red{background:var(--red-bg);color:var(--red-txt);}
.main{padding:16px 20px;max-width:1100px;margin:0 auto;}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:16px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;}
.metric-label{font-size:11px;color:var(--txt-3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.metric-value{font-size:24px;font-weight:500;color:var(--txt);}
.metric-value.red{color:var(--red);}.metric-value.amber{color:var(--amber);}.metric-value.blue{color:var(--blue);}
.kpi-bar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:16px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 14px;display:flex;align-items:center;gap:10px;}
.kpi-icon{font-size:20px;}
.kpi-label{font-size:11px;color:var(--txt-3);}
.kpi-value{font-size:16px;font-weight:500;color:var(--txt);}
.section-label{font-size:11px;font-weight:500;color:var(--txt-3);text-transform:uppercase;letter-spacing:.06em;padding:4px 2px 8px;margin-top:16px;}
.oc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:6px;overflow:hidden;border-left-width:3px;}
.oc-card.urgent{border-left-color:var(--red);}
.oc-card.express{border-left-color:var(--teal);}
.oc-card.warn{border-left-color:var(--amber);}
.oc-card.normal{border-left-color:var(--border);}
.oc-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;}
.oc-header:hover{background:var(--gray-bg);}
.oc-id{font-size:13px;font-weight:500;flex-shrink:0;}
.copy-oc-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--txt-3);padding:0 4px;line-height:1;border-radius:3px;transition:color .1s,background .1s;}
.copy-oc-btn:hover{color:var(--blue);background:var(--blue-bg);}
.copy-oc-btn.copiado{color:var(--teal);}
.oc-cliente{font-size:13px;color:var(--txt-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oc-meta{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;}
.oc-progress{font-size:11px;color:var(--txt-3);flex-shrink:0;}
.chevron{font-size:10px;color:var(--txt-3);margin-left:4px;transition:transform .15s;}
.oc-card.open .chevron{transform:rotate(90deg);}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;}
.b-red{background:var(--red-bg);color:var(--red-txt);}
.b-amber{background:var(--amber-bg);color:var(--amber-txt);}
.b-blue{background:var(--blue-bg);color:var(--blue-txt);}
.b-teal{background:var(--teal-bg);color:var(--teal-txt);}
.b-green{background:var(--green-bg);color:var(--green-txt);}
.b-gray{background:var(--gray-bg);color:var(--gray-txt);}
.oc-lines{display:none;border-top:1px solid var(--border);}
.oc-card.open .oc-lines{display:block;}
.lines-table{width:100%;border-collapse:collapse;font-size:12px;}
.lines-table th{padding:6px 12px;text-align:left;color:var(--txt-3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em;background:var(--bg);}
.lines-table td{padding:7px 12px;border-top:1px solid var(--border);color:var(--txt);vertical-align:top;}
.lines-table td.muted{color:var(--txt-2);}
.lines-table tr:first-child td{border-top:none;}
.estado{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;}
.e-cotizado{background:var(--gray-bg);color:var(--gray-txt);}
.e-comprado{background:var(--blue-bg);color:var(--blue-txt);}
.e-recepcionado{background:var(--teal-bg);color:var(--teal-txt);}
.e-parcial{background:var(--amber-bg);color:var(--amber-txt);}
.e-anulado{background:var(--red-bg);color:var(--red-txt);}
.loading{text-align:center;padding:3rem;color:var(--txt-3);}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:var(--red-bg);border:1px solid var(--red-txt);border-radius:var(--r-md);padding:16px;color:var(--red-txt);margin:1rem 0;font-size:13px;}
.empty{text-align:center;padding:2.5rem;color:var(--txt-3);font-size:13px;}
.alert-banner{background:var(--red-bg);border:1px solid var(--red-txt);border-radius:var(--r-md);padding:10px 14px;margin-bottom:8px;font-size:12px;color:var(--red-txt);}
.view{display:none;}.view.active{display:block;}

/* ── COBRANZA ─────────────────────────────────────────────── */
.cob-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.cob-select{font-size:12px;border:1px solid var(--border-md);border-radius:6px;padding:5px 10px;background:var(--surface);color:var(--txt);cursor:pointer;}
.cob-search{font-size:12px;border:1px solid var(--border-md);border-radius:6px;padding:5px 10px;background:var(--surface);color:var(--txt);flex:1;min-width:160px;}
.cob-table-wrap{overflow-x:auto;border-radius:var(--r-md);border:1px solid var(--border);}
.cob-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);}
.cob-table th{padding:8px 12px;text-align:left;color:var(--txt-3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;}
.cob-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--txt);}
.cob-table tr:last-child td{border-bottom:none;}
.cob-table tr:hover td{background:var(--gray-bg);}
.semaforo{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.semaforo.verde{background:var(--teal-bg);color:var(--teal-txt);}
.semaforo.amarillo{background:var(--amber-bg);color:var(--amber-txt);}
.semaforo.rojo{background:var(--red-bg);color:var(--red-txt);}
.obs-input{width:100%;font-size:11px;border:1px solid var(--border);border-radius:4px;padding:4px 7px;background:var(--surface);color:var(--txt);font-family:inherit;resize:none;min-width:160px;}
.obs-input:focus{outline:none;border-color:var(--blue);}
.obs-input.guardando{border-color:var(--amber);background:var(--amber-bg);}
.obs-input.guardado{border-color:var(--teal);background:var(--teal-bg);}
.cob-monto{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;}
.cob-empty{text-align:center;padding:2rem;color:var(--txt-3);font-size:13px;}
.cob-resumen{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px;}
.cob-kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 14px;}
.cob-kpi-label{font-size:11px;color:var(--txt-3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.cob-kpi-value{font-size:20px;font-weight:500;}
.cob-kpi-value.rojo{color:var(--red);}
.cob-kpi-value.amarillo{color:var(--amber);}
.cob-kpi-value.verde{color:var(--teal);}
.cob-kpi-sub{font-size:11px;color:var(--txt-3);margin-top:2px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">SCC <span>Hub</span> Operacional</div>
  <button class="sync-btn" onclick="cargarDatos()">↻ Actualizar</button>
  <select id="filtro-ejecutivo" onchange="aplicarFiltro()" style="font-size:12px;border:1px solid var(--border-md);border-radius:6px;padding:4px 10px;background:var(--surface);color:var(--txt);cursor:pointer;">
    <option value="">Todos los ejecutivos</option>
    <option value="Wendy Munera">Wendy Munera</option>
    <option value="Gari Saez">Gari Saez</option>
    <option value="Giorgina Vivas">Giorgina Vivas</option>
    <option value="Enrique Cabas">Enrique Cabas</option>
    <option value="Karla Nuñez">Karla Nuñez</option>
    <option value="Belen Sazo">Belen Sazo</option>
    <option value="Manuel Sifontes">Manuel Sifontes</option>
    <option value="Zulay Ramires">Zulay Ramires</option>
    <option value="Pamela Ramos">Pamela Ramos</option>
    <option value="Esteban Yalpi">Esteban Yalpi</option>
  </select>
  <span class="sync-info" id="sync-info">—</span>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('adq')" id="tab-adq">Adquisiciones <span class="tab-count" id="cnt-adq">—</span></button>
  <button class="tab" onclick="switchTab('bodega')" id="tab-bodega">Bodega <span class="tab-count" id="cnt-bodega">—</span></button>
  <button class="tab" onclick="switchTab('alertas')" id="tab-alertas">Alertas <span class="tab-count red" id="cnt-alertas">—</span></button>
  <button class="tab" onclick="switchTab('retiros')" id="tab-retiros">Ruta Logística <span class="tab-count red" id="cnt-retiros">—</span></button>
  <button class="tab" onclick="switchTab('despacho')" id="tab-despacho">Despacho <span class="tab-count red" id="cnt-despacho">—</span></button>
  <button class="tab" onclick="switchTab('cobranza')" id="tab-cobranza">Cobranza <span class="tab-count red" id="cnt-cobranza">—</span></button>
</div>
<div class="main">
  <div id="view-adq" class="view active"></div>
  <div id="view-bodega" class="view"></div>
  <div id="view-alertas" class="view"></div>
  <div id="view-retiros" class="view"></div>
  <div id="view-despacho" class="view"></div>
  <div id="view-cobranza" class="view"></div>
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzwgkQUoJtc4Kw-LB2NS2FjL_WvOjLkkv0DgI_iLr78fG8jVbyV2JpAsuAgKfoFk4jTVA/exec";
let datos = null;
let datosFiltrados = null;
let tabActiva = "adq";
let filtroEjecutivo = "";

function aplicarFiltro() {
  filtroEjecutivo = document.getElementById("filtro-ejecutivo").value;
  if (!datos) return;
  if (!filtroEjecutivo) {
    datosFiltrados = datos;
  } else {
    const ret = datos.retiros || { retiros:[], despachos:[], metricas:{} };
    datosFiltrados = {
      ...datos,
      adquisiciones: datos.adquisiciones.filter(o => o.ejecutivo === filtroEjecutivo),
      bodega:        datos.bodega.filter(o => o.ejecutivo === filtroEjecutivo),
      alertas:       datos.alertas.filter(o => o.ejecutivo === filtroEjecutivo),
      despacho:      (datos.despacho||[]).filter(o => o.ejecutivo === filtroEjecutivo),
      cobranza:      (datos.cobranza||[]).filter(o => o.vendedor === filtroEjecutivo),
      retiros: {
        ...ret,
        retiros:   (ret.retiros||[]).filter(o => o.ejecutivo === filtroEjecutivo),
        despachos: (ret.despachos||[]).filter(o => o.ejecutivo === filtroEjecutivo),
      },
    };
  }
  renderizarTodo();
}

async function cargarDatos() {
  mostrarLoading();
  try {
    const res  = await fetch(API_URL);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || "Error desconocido");
    datos = json.data;
    renderizarTodo();
    document.getElementById("sync-info").textContent =
      "Actualizado " + new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});
  } catch(e) { mostrarError(e.message); }
}

function mostrarLoading() {
  ["adq","bodega","alertas","retiros","despacho","cobranza"].forEach(v => {
    document.getElementById("view-"+v).innerHTML =
      '<div class="loading"><div class="spinner"></div><br>Cargando datos...</div>';
  });
}
function mostrarError(msg) {
  document.getElementById("view-"+tabActiva).innerHTML =
    '<div class="error-box">Error al cargar datos: '+msg+'</div>';
}

function renderizarTodo() {
  if (!datos) return;
  datosFiltrados = filtroEjecutivo ? datosFiltrados : datos;
  const m = datos.metricas;

  document.getElementById("cnt-adq").textContent    = m.adq ? m.adq.total : 0;
  document.getElementById("cnt-bodega").textContent  = m.bodega ? m.bodega.total : 0;
  document.getElementById("cnt-alertas").textContent = "…";

  if (!datos.despacho)       datos.despacho = [];
  if (!datos.retiros)        datos.retiros  = { retiros:[], despachos:[], metricas:{} };
  if (!datos.retiros.retiros)   datos.retiros.retiros   = [];
  if (!datos.retiros.despachos) datos.retiros.despachos = [];
  if (!datos.cobranza)       datos.cobranza = [];

  const totalRetiros = (datos.retiros.metricas||{}).totalRetiros || 0;
  const despachosRM  = (datos.retiros.metricas||{}).despachosRM  || 0;
  document.getElementById("cnt-retiros").textContent  = totalRetiros + despachosRM;
  document.getElementById("cnt-despacho").textContent = (m.despacho||{}).total || datos.despacho.length || 0;

  // Contador cobranza: documentos en rojo o amarillo
  const cob = datos.cobranza || [];
  const cobCriticos = cob.filter(f => f.nivel === "rojo" || f.nivel === "amarillo").length;
  document.getElementById("cnt-cobranza").textContent = cobCriticos || cob.length;

  renderizarAdq();
  renderizarBodega();
  renderizarAlertas();
  renderizarRetiros();
  renderizarDespacho();
  renderizarCobranza();
}

// ── ADQUISICIONES ─────────────────────────────────────────────
let filtroAdq = "todos";

function renderizarAdq() {
  const d = datosFiltrados || datos;
  const m   = datos.metricas.adq;
  const ocs = d.adquisiciones;
  let html  = metricas([
    {label:"Pendientes",    value:m.total,        cls:""},
    {label:"Atrasadas",     value:m.atrasadas,    cls:m.atrasadas>0?"red":""},
    {label:"Express",       value:m.express,      cls:m.express>0?"amber":""},
    {label:"Sin encargado", value:m.sinEncargado, cls:m.sinEncargado>0?"red":""},
  ]);

  const sinAsignar   = ocs.filter(o=>o.sinEncargado);
  const muyAtrasadas = ocs.filter(o=>o.adqMuyAtrasada && !o.sinEncargado);
  const atrasadas    = ocs.filter(o=>o.adqAtrasada && !o.adqMuyAtrasada && !o.sinEncargado);
  const express      = ocs.filter(o=>!o.adqAtrasada&&o.esExpress&&!o.sinEncargado);
  const normales     = ocs.filter(o=>!o.adqAtrasada&&!o.esExpress&&!o.sinEncargado);
  const todasAtrasadas = [...muyAtrasadas, ...atrasadas];

  const subTabs = [
    {key:"todos",      label:"Todas",        cnt:ocs.length,            cls:"b-gray"},
    {key:"sinAsignar", label:"Sin asignar",  cnt:sinAsignar.length,     cls:"b-red"},
    {key:"atrasadas",  label:"Atrasadas",    cnt:todasAtrasadas.length, cls:"b-amber"},
    {key:"express",    label:"⚡ Express",   cnt:express.length,        cls:"b-teal"},
    {key:"normales",   label:"Normales",     cnt:normales.length,       cls:"b-blue"},
  ];

  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">` +
    subTabs.map(t => `<button onclick="setFiltroAdq('${t.key}')" id="adq-sub-${t.key}"
      style="border:1px solid var(--border-md);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;
      background:${filtroAdq===t.key?"var(--blue)":"var(--surface)"};
      color:${filtroAdq===t.key?"#fff":"var(--txt-2)"};font-weight:${filtroAdq===t.key?500:400}">
      ${t.label} <span style="opacity:.7">${t.cnt}</span>
    </button>`).join("") + `</div>`;

  if (ocs.length===0){html+='<div class="empty">Sin órdenes pendientes</div>';
    document.getElementById("view-adq").innerHTML=html;return;}

  let mostrar = { sinAsignar, muyAtrasadas, atrasadas, express, normales };
  if (filtroAdq === "sinAsignar")  { mostrar = {sinAsignar, muyAtrasadas:[], atrasadas:[], express:[], normales:[]}; }
  if (filtroAdq === "atrasadas")   { mostrar = {sinAsignar:[], muyAtrasadas, atrasadas, express:[], normales:[]}; }
  if (filtroAdq === "express")     { mostrar = {sinAsignar:[], muyAtrasadas:[], atrasadas:[], express, normales:[]}; }
  if (filtroAdq === "normales")    { mostrar = {sinAsignar:[], muyAtrasadas:[], atrasadas:[], express:[], normales}; }

  if(mostrar.sinAsignar.length>0){html+='<div class="section-label">Sin encargado asignado</div>';
    mostrar.sinAsignar.forEach(o=>{html+=cardAdq(o,"urgent");});}
  if(mostrar.muyAtrasadas.length>0){html+='<div class="section-label">🔴 Alerta máxima — más de 48h sin comprar</div>';
    mostrar.muyAtrasadas.forEach(o=>{html+=cardAdq(o,"urgent");});}
  if(mostrar.atrasadas.length>0){html+='<div class="section-label">🟡 Atrasadas — más de 24h sin comprar</div>';
    mostrar.atrasadas.forEach(o=>{html+=cardAdq(o,"warn");});}
  if(mostrar.express.length>0){html+='<div class="section-label">⚡ Express — cotización lista</div>';
    mostrar.express.forEach(o=>{html+=cardAdq(o,"express");});}
  if(mostrar.normales.length>0){html+='<div class="section-label">En gestión normal</div>';
    mostrar.normales.forEach(o=>{html+=cardAdq(o,"normal");});}

  const totalMostradas = Object.values(mostrar).flat().length;
  if(totalMostradas===0){html+='<div class="empty">Sin órdenes en esta categoría</div>';}

  document.getElementById("view-adq").innerHTML=html;
}

function setFiltroAdq(key) {
  filtroAdq = key;
  renderizarAdq();
}

function cardAdq(o, tipo) {
  const badgeT = o.adqMuyAtrasada ? badge("🔴 "+o.horasHabiles+"h","b-red")
    : o.adqAtrasada ? badge("🟡 "+o.horasHabiles+"h","b-amber")
    : o.esExpress ? badge("⚡ Express","b-teal") : badge(o.horasHabiles+"h","b-blue");
  const badgeE = o.sinEncargado ? badge("Sin asignar","b-red") : badge(o.encargado,"b-gray");

  // ── Semáforo morosidad — usa campo "morosidad" del backend ──
  let badgeMora = "";
  if (o.morosidad) {
    if (o.morosidad.nivel === "rojo") {
      badgeMora = badge("🔴 Mora " + o.morosidad.diasMaxMora + "d", "b-red");
    } else if (o.morosidad.nivel === "amarillo") {
      badgeMora = badge("🟡 Mora " + o.morosidad.diasMaxMora + "d", "b-amber");
    }
    // verde = sin badge visible (cliente al día)
  }

  const badgeA = o.alertaAnuladoRecepcionado ? badge("⛔ Dev. pendiente","b-red") : "";
  const progreso = `<span class="oc-progress">${o.lineas.length}/${o.totalLineas} líneas</span>`;

  let filas = o.lineas.map(l=>{
    const esRetiroPte = l.estado === "Retiro Pte.";
    const estadoBadge = esRetiroPte
      ? `<span class="estado" style="background:#EDE9F5;color:#5B3FA6;">⏳ Retiro Pte.</span>`
      : `<span class="estado ${estadoCls(l.estado)}">${l.estado}</span>`;
    return `<tr${esRetiroPte ? ' style="background:var(--gray-bg)"' : ''}>
    <td>${l.producto||"—"}</td>
    <td class="muted" style="text-align:center">${l.cantidad||"—"}</td>
    <td class="muted">${l.proveedor||"—"}</td>
    <td class="muted">${estadoBadge}</td>
    <td class="muted">${l.obsVentas||"—"}</td>
  </tr>`;}).join("");

  // Bloque de advertencia morosidad expandido (dentro del detalle)
  let bloquesMora = "";
  if (o.morosidad && o.morosidad.nivel !== "verde") {
    const colorMora = o.morosidad.nivel === "rojo" ? "var(--red-bg)" : "var(--amber-bg)";
    const colorBorde = o.morosidad.nivel === "rojo" ? "var(--red)" : "var(--amber)";
    const colorTxt  = o.morosidad.nivel === "rojo" ? "var(--red-txt)" : "var(--amber-txt)";
    const accion = o.morosidad.nivel === "rojo"
      ? "Cliente con mora grave (+60 días). El ejecutivo debe iniciar gestión de denuncia en Mercado Público o Contraloría."
      : "Cliente con mora activa (30-60 días). Avisar al ejecutivo para seguimiento.";
    bloquesMora = `<div style="padding:10px 14px;background:${colorMora};border-top:1px solid ${colorBorde};display:flex;align-items:flex-start;gap:8px;">
      <span style="font-size:16px">${o.morosidad.nivel==="rojo"?"🔴":"🟡"}</span>
      <div>
        <div style="font-size:12px;font-weight:600;color:${colorTxt};margin-bottom:2px;">Alerta de morosidad — ${o.morosidad.diasMaxMora} días</div>
        <div style="font-size:11px;color:${colorTxt};opacity:.85">${accion}</div>
      </div>
    </div>`;
  }

  return `<div class="oc-card ${tipo}" onclick="toggleCard(this)">
    <div class="oc-header">
      <span class="oc-id">${o.idOC}</span>
      <button class="copy-oc-btn" onclick="copiarOC(event,'${o.idOC}')" title="Copiar OC">⧉</button>
      <span class="oc-cliente">${o.cliente}</span>
      <div class="oc-meta">${badgeT}${badgeE}${badgeA}${badgeMora}${progreso}</div>
      <span class="chevron">▶</span>
    </div>
    <div class="oc-lines">
      ${bloquesMora}
      <table class="lines-table">
        <thead><tr><th>Producto</th><th>Cant.</th><th>Proveedor</th><th>Estado</th><th>Obs. ventas</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>
  </div>`;
}

function renderizarAlertas() {
  const d = datosFiltrados || datos;
  const m   = datos.metricas.alertas;
  const ocs = d.alertas;

  const graves = ocs.filter(o =>
    o.diasAtrasoEntrega >= 3 ||
    (o.horasHabiles >= 48 && !o.adqComprada) ||
    o.alertaAnuladoRecepcionado
  );

  const cntVencidas3d = ocs.filter(o => o.diasAtrasoEntrega >= 3).length;
  const cntSin48h     = ocs.filter(o => o.horasHabiles >= 48 && !o.adqComprada).length;
  const cntAnulRec    = ocs.filter(o => o.alertaAnuladoRecepcionado).length;

  let html = metricas([
    {label:"Vencidas +3 días",    value:cntVencidas3d, cls:cntVencidas3d>0?"red":""},
    {label:"+48h sin comprar",    value:cntSin48h,     cls:cntSin48h>0?"red":""},
    {label:"Anulado+recepcionado",value:cntAnulRec,    cls:cntAnulRec>0?"red":""},
    {label:"Total casos graves",  value:graves.length, cls:graves.length>0?"red":""},
  ]);

  document.getElementById("cnt-alertas").textContent = graves.length;

  if(graves.length===0){html+='<div class="empty">Sin alertas graves activas ✅</div>';
    document.getElementById("view-alertas").innerHTML=html;return;}

  const vencidas3d = graves.filter(o => o.diasAtrasoEntrega >= 3);
  const sin48h     = graves.filter(o => o.horasHabiles >= 48 && !o.adqComprada && !(o.diasAtrasoEntrega >= 3));
  const anulRec    = graves.filter(o => o.alertaAnuladoRecepcionado && !(o.diasAtrasoEntrega >= 3) && !(o.horasHabiles >= 48 && !o.adqComprada));

  if(vencidas3d.length>0){html+='<div class="section-label">🔴 Vencidas más de 3 días — acción urgente</div>';
    vencidas3d.forEach(o=>{html+=cardAlerta(o,"urgent");});}
  if(sin48h.length>0){html+='<div class="section-label">🟠 Más de 48h sin comprar</div>';
    sin48h.forEach(o=>{html+=cardAlerta(o,"warn");});}
  if(anulRec.length>0){html+='<div class="section-label">⛔ Anulado con recepción pendiente — devolución</div>';
    anulRec.forEach(o=>{html+=cardAlerta(o,"urgent");});}
  document.getElementById("view-alertas").innerHTML=html;
}

function cardAlerta(o, tipo) {
  const badges = [];
  if(o.diasAtrasoEntrega>0) badges.push(badge(o.diasAtrasoEntrega+"d vencida",o.critico?"b-red":"b-amber"));
  if(o.sinEncargado)        badges.push(badge("Sin asignar","b-red"));
  if(o.horasHabiles>48)     badges.push(badge("Adq. "+o.horasHabiles+"h","b-amber"));
  if(o.alertaAnuladoRecepcionado) badges.push(badge("⛔ Dev. pendiente","b-red"));
  badges.push(badge(o.ejecutivo||"—","b-gray"));

  let filas = o.lineas.map(l=>`<tr>
    <td>${l.producto||"—"}</td>
    <td class="muted" style="text-align:center">${l.cantidad||"—"}</td>
    <td><span class="estado ${estadoCls(l.estado)}">${l.estado}</span></td>
    <td class="muted">${l.proveedor||"—"}</td>
  </tr>`).join("");

  return `<div class="oc-card ${tipo}" onclick="toggleCard(this)">
    <div class="oc-header">
      <span class="oc-id">${o.idOC}</span>
      <button class="copy-oc-btn" onclick="copiarOC(event,'${o.idOC}')" title="Copiar OC">⧉</button>
      <span class="oc-cliente">${o.cliente}</span>
      <div class="oc-meta">${badges.join("")}</div>
      <span class="chevron">▶</span>
    </div>
    <div class="oc-lines"><table class="lines-table">
      <thead><tr><th>Producto</th><th>Cant.</th><th>Estado</th><th>Proveedor</th></tr></thead>
      <tbody>${filas}</tbody>
    </table></div>
  </div>`;
}

// ── COBRANZA ──────────────────────────────────────────────────
let cobFiltroVendedor = "";
let cobFiltroBusqueda = "";
let cobFiltroNivel    = "";

function renderizarCobranza() {
  const d   = datosFiltrados || datos;
  const filas = d.cobranza || [];

  // KPIs
  const totalSaldo    = filas.reduce((s, f) => s + (f.saldo||0), 0);
  const totalRojo     = filas.filter(f=>f.nivel==="rojo").reduce((s,f)=>s+(f.saldo||0),0);
  const totalAmarillo = filas.filter(f=>f.nivel==="amarillo").reduce((s,f)=>s+(f.saldo||0),0);
  const totalVerde    = filas.filter(f=>f.nivel==="verde").reduce((s,f)=>s+(f.saldo||0),0);
  const cntRojo       = filas.filter(f=>f.nivel==="rojo").length;
  const cntAmarillo   = filas.filter(f=>f.nivel==="amarillo").length;

  const fmt = v => "$" + Math.round(v).toLocaleString("es-CL");

  let html = `<div class="cob-resumen">
    <div class="cob-kpi">
      <div class="cob-kpi-label">Cartera total</div>
      <div class="cob-kpi-value">${fmt(totalSaldo)}</div>
      <div class="cob-kpi-sub">${filas.length} documentos</div>
    </div>
    <div class="cob-kpi">
      <div class="cob-kpi-label">🔴 En rojo (+60d)</div>
      <div class="cob-kpi-value rojo">${fmt(totalRojo)}</div>
      <div class="cob-kpi-sub">${cntRojo} documentos</div>
    </div>
    <div class="cob-kpi">
      <div class="cob-kpi-label">🟡 En amarillo (30-60d)</div>
      <div class="cob-kpi-value amarillo">${fmt(totalAmarillo)}</div>
      <div class="cob-kpi-sub">${cntAmarillo} documentos</div>
    </div>
    <div class="cob-kpi">
      <div class="cob-kpi-label">🟢 Al día (&lt;30d)</div>
      <div class="cob-kpi-value verde">${fmt(totalVerde)}</div>
      <div class="cob-kpi-sub">${filas.filter(f=>f.nivel==="verde").length} documentos</div>
    </div>
  </div>`;

  // Toolbar con filtros
  const vendedores = [...new Set(filas.map(f=>f.vendedor).filter(Boolean))].sort();
  html += `<div class="cob-toolbar">
    <select class="cob-select" onchange="setCobFiltroVendedor(this.value)">
      <option value="">Todos los vendedores</option>
      ${vendedores.map(v=>`<option value="${v}" ${cobFiltroVendedor===v?"selected":""}>${v}</option>`).join("")}
    </select>
    <select class="cob-select" onchange="setCobFiltroNivel(this.value)">
      <option value="">Todos los niveles</option>
      <option value="rojo" ${cobFiltroNivel==="rojo"?"selected":""}>🔴 Rojo (+60d)</option>
      <option value="amarillo" ${cobFiltroNivel==="amarillo"?"selected":""}>🟡 Amarillo (30-60d)</option>
      <option value="verde" ${cobFiltroNivel==="verde"?"selected":""}>🟢 Verde (al día)</option>
    </select>
    <input class="cob-search" type="text" placeholder="Buscar cliente o RUT…"
      value="${cobFiltroBusqueda}"
      oninput="setCobBusqueda(this.value)">
  </div>`;

  // Aplicar filtros locales
  let filtradas = filas;
  if (cobFiltroVendedor) filtradas = filtradas.filter(f=>f.vendedor===cobFiltroVendedor);
  if (cobFiltroNivel)    filtradas = filtradas.filter(f=>f.nivel===cobFiltroNivel);
  if (cobFiltroBusqueda) {
    const q = cobFiltroBusqueda.toLowerCase();
    filtradas = filtradas.filter(f=>
      (f.razon||"").toLowerCase().includes(q) ||
      (f.rut||"").toLowerCase().includes(q)
    );
  }

  // Ordenar: rojo primero, luego amarillo, luego verde; dentro de cada grupo por días mora desc
  filtradas = [...filtradas].sort((a,b)=>{
    const ord = {rojo:0, amarillo:1, verde:2};
    if (ord[a.nivel] !== ord[b.nivel]) return ord[a.nivel] - ord[b.nivel];
    return (b.diasMora||0) - (a.diasMora||0);
  });

  if (filtradas.length === 0) {
    html += '<div class="cob-empty">Sin documentos que coincidan con los filtros</div>';
    document.getElementById("view-cobranza").innerHTML = html;
    return;
  }

  html += `<div class="cob-table-wrap"><table class="cob-table">
    <thead><tr>
      <th>Estado</th>
      <th>Cliente</th>
      <th>RUT</th>
      <th>Vendedor</th>
      <th>Doc.</th>
      <th>Vencimiento</th>
      <th>Días mora</th>
      <th style="text-align:right">Saldo</th>
      <th>Observaciones ejecutivo</th>
    </tr></thead>
    <tbody>`;

  filtradas.forEach(f => {
    const fv = f.fechaVenc
      ? new Date(f.fechaVenc).toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit",year:"numeric"})
      : "—";
    const iconNivel = f.nivel==="rojo"?"🔴":f.nivel==="amarillo"?"🟡":"🟢";
    const labelNivel = f.nivel==="rojo"
      ? `+60d — Denunciar`
      : f.nivel==="amarillo"
      ? `30-60d — Seguimiento`
      : `Al día`;

    html += `<tr>
      <td><span class="semaforo ${f.nivel}">${iconNivel} ${labelNivel}</span></td>
      <td style="font-weight:500;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${f.razon||''}">${f.razon||"—"}</td>
      <td style="font-size:11px;color:var(--txt-3)">${f.rut||"—"}</td>
      <td style="font-size:11px">${f.vendedor||"—"}</td>
      <td style="font-size:11px;color:var(--txt-3)">${f.documento||""} ${f.numero||""}</td>
      <td style="font-size:11px;white-space:nowrap">${fv}</td>
      <td style="text-align:center;font-weight:${f.diasMora>0?600:400};color:${f.nivel==="rojo"?"var(--red)":f.nivel==="amarillo"?"var(--amber)":"var(--txt-2)"}">${f.diasMora>0?f.diasMora+"d":"—"}</td>
      <td class="cob-monto" style="color:${f.nivel==="rojo"?"var(--red)":f.nivel==="amarillo"?"var(--amber)":"var(--txt)"}">${"$"+Math.round(f.saldo||0).toLocaleString("es-CL")}</td>
      <td><textarea class="obs-input" rows="2"
        data-row="${f.rowIndex}"
        onblur="guardarObsCobranza(this)"
        placeholder="Ej: Llamar el 20/05, prometió pago en 10 días…">${escapeHtml(f.obs||"")}</textarea></td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  html += `<div style="font-size:11px;color:var(--txt-3);margin-top:8px;text-align:right">
    ${filtradas.length} de ${filas.length} documentos · Fuente: base de datos cobranza · Se actualiza con cada carga
  </div>`;

  document.getElementById("view-cobranza").innerHTML = html;
}

function setCobFiltroVendedor(v) { cobFiltroVendedor = v; renderizarCobranza(); }
function setCobFiltroNivel(v)    { cobFiltroNivel    = v; renderizarCobranza(); }
function setCobBusqueda(v)       { cobFiltroBusqueda = v; renderizarCobranza(); }

async function guardarObsCobranza(textarea) {
  const rowIndex = parseInt(textarea.dataset.row);
  const obs      = textarea.value.trim();

  // Actualizar en memoria para no perder al re-render
  const filas = (datosFiltrados||datos).cobranza || [];
  const fila  = filas.find(f => f.rowIndex === rowIndex);
  if (fila) fila.obs = obs;
  // También en datos originales
  const filaOrig = (datos.cobranza||[]).find(f=>f.rowIndex===rowIndex);
  if (filaOrig) filaOrig.obs = obs;

  textarea.classList.add("guardando");
  textarea.classList.remove("guardado");

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ accion: "guardarObs", rowIndex, obs }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || "Error al guardar");
    textarea.classList.remove("guardando");
    textarea.classList.add("guardado");
    setTimeout(()=>{ textarea.classList.remove("guardado"); }, 2000);
  } catch(err) {
    textarea.classList.remove("guardando");
    textarea.style.borderColor = "var(--red)";
    textarea.title = "Error al guardar: " + err.message;
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── UTILS ─────────────────────────────────────────────────────
function estadoCls(e) {
  if(!e) return "e-cotizado";
  if(e==="Comprado") return "e-comprado";
  if(e==="Recepcionado") return "e-recepcionado";
  if(e==="Recepcion parcial") return "e-parcial";
  if(e==="Anulado") return "e-anulado";
  return "e-cotizado";
}
function metricas(items) {
  return '<div class="metrics">'+items.map(i=>
    `<div class="metric"><div class="metric-label">${i.label}</div>
     <div class="metric-value ${i.cls}">${i.value}</div></div>`
  ).join("")+'</div>';
}
function badge(txt,cls){return `<span class="badge ${cls}">${txt}</span>`;}
function kpiPromedio(ocs, campo) {
  if(!ocs||ocs.length===0) return "—";
  const vals = ocs.map(o=>o[campo]||0).filter(v=>v>0);
  if(vals.length===0) return "—";
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function switchTab(name) {
  ["adq","bodega","alertas","retiros","despacho","cobranza"].forEach(n=>{
    document.getElementById("tab-"+n).classList.toggle("active",n===name);
    document.getElementById("view-"+n).classList.toggle("active",n===name);
  });
  tabActiva=name;
}
function toggleCard(card){card.classList.toggle("open");}

function renderizarRetiros() {
  const d = datosFiltrados || datos;
  const r = d.retiros || datos.retiros;

    {label:"Retiros pendientes", value:m.totalRetiros||0,  cls:(m.totalRetiros||0)>0?"amber":""},
    {label:"Completan OC",       value:m.completanOC||0,   cls:(m.completanOC||0)>0?"red":""},
    {label:"Despachos RM",       value:m.despachosRM||0,   cls:(m.despachosRM||0)>0?"red":""},
    {label:"Atrasados",          value:m.atrasados||0,     cls:(m.atrasados||0)>0?"red":""},
  ]);

  const despachos = r.despachos || [];
  const retiros   = r.retiros   || [];

  if(despachos.length>0||retiros.filter(o=>o.listo).length>0){
    html+='<div style="margin-bottom:12px"><button onclick="generarRuta()" style="background:#0F6E56;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;width:100%">Generar ruta del dia en Google Maps</button></div>';}

    html += '<div class="empty">Sin retiros ni despachos pendientes ✅</div>';

  }

  if (despachos.length > 0) {
    html += '<div class="section-label">🚚 Prioridad 1 — Despachos RM Daniel</div>';

      const badgeD = o.diasAtraso > 0
        ? badge(o.diasAtraso+"d vencido","b-red")
        : badge("En plazo","b-teal");
      let filas = o.lineas.map(l => `<tr>
        <td>${l.producto||"—"}</td>
        <td class="muted" style="text-align:center">${l.cantidad||"—"}</td>
        <td class="muted">${l.proveedor||"—"}</td>
        <td class="muted">${l.obsLogistica||"—"}</td>
      </tr>`).join("");
      html += `<div class="oc-card ${o.diasAtraso>0?"urgent":"normal"}" onclick="toggleCard(this)">
        <div class="oc-header">
          <span class="oc-id">${o.idOC}</span>
          <button class="copy-oc-btn" onclick="copiarOC(event,'${o.idOC}')" title="Copiar OC">⧉</button>
          <span class="oc-cliente">${o.cliente}</span>
          <div class="oc-meta">${badgeD}${badge("RM","b-blue")}${badge(o.ejecutivo,"b-gray")}</div>
          <span class="chevron">▶</span>
        </div>
        <div class="oc-lines"><table class="lines-table">
          <thead><tr><th>Producto</th><th>Cant.</th><th>Proveedor</th><th>Obs.</th></tr></thead>
          <tbody>${filas}</tbody>
        </table>
        <div style="padding:8px 12px;font-size:12px;color:var(--txt-2)">
          📍 ${o.dir} · ${o.region}
        </div></div>
      </div>`;
    });
  }

  const completanOC = retiros.filter(o => o.completaOC);
  const resto       = retiros.filter(o => !o.completaOC);

  if (completanOC.length > 0) {
    html += '<div class="section-label">🔴 Prioridad 2 — Retiros que completan OC</div>';
    completanOC.forEach(o => { html += cardRetiro(o, "urgent"); });
  }
  if (resto.length > 0) {
    html += '<div class="section-label">🟡 Otros retiros</div>';
    resto.forEach(o => { html += cardRetiro(o, "warn"); });
  }

  document.getElementById("view-retiros").innerHTML = html;
}

function cardRetiro(o, tipo) {
  const badgeC = o.completaOC ? badge("Completa OC","b-red") : badge("Parcial","b-amber");
  const badgeL = o.listo ? badge("✅ Listo retirar","b-teal") : badge("⏳ Pte. confirmar","b-amber");
  const badgeD = o.diasAtrasoEntrega > 0
    ? badge(o.diasAtrasoEntrega+"d vencida","b-red")
    : badge("En plazo","b-teal");

  let filas = o.lineas.map(l => `<tr>
    <td>${l.producto||"—"}</td>
    <td class="muted" style="text-align:center">${l.cantidad||"—"}</td>
    <td class="muted">${l.proveedor||"—"}</td>
    <td class="muted">${l.obsCompras||"—"}</td>
    <td class="muted" style="color:var(--teal-txt)">${l.obsLogistica||"Sin direccion proveedor"}</td>
  </tr>`).join("");

  return `<div class="oc-card ${tipo}" onclick="toggleCard(this)">
    <div class="oc-header">
      <span class="oc-id">${o.idOC}</span>
      <button class="copy-oc-btn" onclick="copiarOC(event,'${o.idOC}')" title="Copiar OC">⧉</button>
      <span class="oc-cliente">${o.cliente}</span>
      <div class="oc-meta">${badgeC}${badgeL}${badgeD}${badge(o.ejecutivo,"b-gray")}</div>
      <span class="chevron">▶</span>
    </div>
    <div class="oc-lines"><table class="lines-table">
      <thead><tr><th>Producto</th><th>Cant.</th><th>Proveedor</th><th>Obs. compras</th><th>Obs. logística</th></tr></thead>
      <tbody>${filas}</tbody>
    </table>
    <div style="padding:8px 12px;font-size:12px;color:var(--txt-2)">
      📍 ${o.dir} · ${o.region} &nbsp;|&nbsp; ${o.lineasListas||0}/${o.totalLineas} líneas listas
    </div></div>
  </div>`;
}

// ── DESPACHO ──────────────────────────────────────────────────
function renderizarDespacho() {
  const d = datosFiltrados || datos;
  const ocs = d.despacho || [];
  const m   = datos.metricas.despacho || {};

  let html = metricas([
    {label:"Listos para despachar", value:m.total||0,     cls:(m.total||0)>0?"blue":""},
    {label:"Con atraso",            value:m.atrasadas||0, cls:(m.atrasadas||0)>0?"amber":""},
    {label:"Urgentes (+3d)",        value:m.urgentes||0,  cls:(m.urgentes||0)>0?"red":""},
    {label:"En plazo",              value:(m.total||0)-(m.atrasadas||0), cls:""},
  ]);

  if(ocs.length===0){
    html += '<div class="empty">Sin pedidos listos para despachar ✅</div>';
    document.getElementById("view-despacho").innerHTML=html;
    return;
  }

  const urgentes  = ocs.filter(o=>o.diasAtrasoEntrega>=3);
  const atrasadas = ocs.filter(o=>o.diasAtrasoEntrega>0&&o.diasAtrasoEntrega<3);
  const enPlazo   = ocs.filter(o=>o.diasAtrasoEntrega===0);

  if(urgentes.length>0){html+='<div class="section-label">🔴 Urgentes — más de 3 días vencidos</div>';
    urgentes.forEach(o=>{html+=cardDespacho(o,"urgent");});}
  if(atrasadas.length>0){html+='<div class="section-label">🟡 Con atraso</div>';
    atrasadas.forEach(o=>{html+=cardDespacho(o,"warn");});}
  if(enPlazo.length>0){html+='<div class="section-label">🟢 En plazo — solicitar despacho</div>';
    enPlazo.forEach(o=>{html+=cardDespacho(o,"normal");});}

  document.getElementById("view-despacho").innerHTML=html;
}

function cardDespacho(o, tipo) {
  const fecha = o.entregaOC ? new Date(o.entregaOC).toLocaleDateString("es-CL") : "Sin fecha";
  const badgeD = o.diasAtrasoEntrega>0
    ? badge(o.diasAtrasoEntrega+"d vencida","b-red")
    : badge("En plazo","b-teal");

  let filas = o.lineas.map(l=>`<tr>
    <td>${l.producto||"—"}</td>
    <td class="muted" style="text-align:center">${l.cantidad||"—"}</td>
    <td class="muted">${l.proveedor||"—"}</td>
    <td><span class="estado e-recepcionado">${l.estado}</span></td>
  </tr>`).join("");

  return `<div class="oc-card ${tipo}" onclick="toggleCard(this)">
    <div class="oc-header">
      <span class="oc-id">${o.idOC}</span>
      <button class="copy-oc-btn" onclick="copiarOC(event,'${o.idOC}')" title="Copiar OC">⧉</button>
      <span class="oc-cliente">${o.cliente}</span>
      <div class="oc-meta">${badgeD}${badge("✅ Listo despachar","b-teal")}${badge(o.ejecutivo,"b-gray")}</div>
      <span class="chevron">▶</span>
    </div>
    <div class="oc-lines">
      <table class="lines-table">
        <thead><tr><th>Producto</th><th>Cant.</th><th>Proveedor</th><th>Estado</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>
      <div style="padding:8px 12px;font-size:12px;color:var(--txt-2)">
        📍 ${o.dir} · ${o.region} &nbsp;|&nbsp; 📅 Entrega: ${fecha}
      </div>
      <div style="padding:4px 12px 10px;font-size:12px;background:var(--teal-bg);color:var(--teal-txt);font-weight:500">
        ⚡ Acción requerida: Contactar cliente y enviar solicitud de despacho a administración
      </div>
    </div>
  </div>`;
}

function generarRuta() {
  const d = datosFiltrados || datos;
  if (!d || !d.retiros) return;

  const despachos = d.retiros.despachos || [];
  const retiros   = d.retiros.retiros   || [];
  const paradas   = [];

  despachos.forEach(o => {
    if (o.dir && o.dir.trim()) paradas.push(o.dir + ", " + o.region + ", Chile");
  });
  retiros.filter(o => o.completaOC && o.listo).forEach(o => {
    const dirRetiro = o.lineas
      .filter(l => l.estado === "Retiro" && l.obsLogistica && l.obsLogistica.trim())
      .map(l => l.obsLogistica.trim())[0];
    if (dirRetiro) paradas.push(dirRetiro + ", Chile");
    else if (o.dir && o.dir.trim()) paradas.push(o.dir + ", Chile");
  });
  retiros.filter(o => !o.completaOC && o.listo).forEach(o => {
    const dirRetiro = o.lineas
      .filter(l => l.estado === "Retiro" && l.obsLogistica && l.obsLogistica.trim())
      .map(l => l.obsLogistica.trim())[0];
    if (dirRetiro) paradas.push(dirRetiro + ", Chile");
    else if (o.dir && o.dir.trim()) paradas.push(o.dir + ", Chile");
  });

  if (paradas.length === 0) {
    alert("No hay paradas con dirección registrada para generar la ruta.");
    return;
  }

  const origen    = "Eliodoro Yanez 2745, Providencia, Santiago, Chile";
  const destino   = paradas[paradas.length - 1];
  const waypoints = paradas.slice(0, -1).join("|");

  let url = "https://www.google.com/maps/dir/?api=1";
  url += "&origin="      + encodeURIComponent(origen);
  url += "&destination=" + encodeURIComponent(destino);
  if (waypoints) url += "&waypoints=" + encodeURIComponent(waypoints);
  url += "&travelmode=driving";
  window.open(url, "_blank");
}

function copiarOC(e, idOC) {
  e.stopPropagation();
  const btn = e.currentTarget;
  function mostrarCopiado() {
    btn.textContent = "✓";
    btn.style.color = "var(--teal)";
    btn.style.fontWeight = "700";
    setTimeout(() => {
      btn.textContent = "⧉";
      btn.style.color = "";
      btn.style.fontWeight = "";
    }, 1500);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(idOC).then(mostrarCopiado).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = idOC; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      mostrarCopiado();
    });
  } else {
    const ta = document.createElement("textarea");
    ta.value = idOC; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    mostrarCopiado();
  }
}

cargarDatos();
setInterval(cargarDatos, 10*60*1000);
